        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>4月14日（周二），巴西国家商品供应公司（ Conab ）公布的数据显示，巴西2025/26年度棉花产量预估为384.32万吨，同比减少5.8%，上一年度为408.15万吨。据棉花信息网调研，新疆棉花实际种植面积缩减程度小于预期，下游内地订单开始萎缩，开机率降低。利多部分消退。预计区间震荡整理。</p></div></div>
