      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>白糖：郑糖主力隔夜偏强运行。国际油价较高叠加主产国巴西新榨季开始，预计巴西制糖比将继续下调。不过国际糖价受近期油价大跌影响有所下调，预计下跌空间有限。国内方面，本榨季超预期增产拖累糖价。不过考虑巴西制糖比可能走低，叠加进口许可证或进一步收紧，国际糖价止跌企稳，国内糖价有筑底走强态势。</p></div></div>
