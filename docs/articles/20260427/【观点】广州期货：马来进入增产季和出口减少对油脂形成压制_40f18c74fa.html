      </header>
      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>马来西亚棕榈油协会（ MPOA ）公布的数据显示，马来西亚4月1-20日毛棕榈油产量较3月同期增加17.52%。各国机构认为五月厄尔尼诺现象出现概率极大，厄尔尼诺现象容易导致棕榈油减产。但当前正逢棕榈油增产季节，高价影响了进口意愿，马来去库速度预计放缓。预计油脂本日温和震荡。</p></div></div>
