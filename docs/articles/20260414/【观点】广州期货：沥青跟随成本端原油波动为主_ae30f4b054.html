      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>受原料偏紧及部分炼厂转产渣油、停产检修等因素影响，国内沥青炼厂开工率持续处于历史低位。沥青终端<span><span class="link-wrapper link-blue" style="word-break:break-all;cursor:pointer;color:#36F">消费（883434）</span></span>虽然驱动较弱，但存在一定刚需支撑。美伊谈判结束但未达成协议，地缘局势不确定性依然存在，沥青价格将继续受到成本端原油波动的影响，但需求相对疲软或限制其反弹高度。</p></div></div>
