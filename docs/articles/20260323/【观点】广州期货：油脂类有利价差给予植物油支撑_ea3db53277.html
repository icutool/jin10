      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>3月19日（周四），马来西亚棕榈油理事会（ MPOC ）表示，由于中东冲突导致原油价格持续走高，棕榈油价格短期内有望保持在每吨4,450马币以上。受近期价格高涨影响，植物油食用需求减弱，库存略增，遏制了涨幅，但后续走势依然主要受原油价格影响。</p></div></div>
