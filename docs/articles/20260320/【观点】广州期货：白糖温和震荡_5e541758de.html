      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>据国家统计局3月19日公布数据显示，中国1-2月成品糖产量为677.9万吨，同比增长11.4%，处于近年来同期高位。国内，受美伊反复冲突<span><span class="link-wrapper link-blue" style="word-break:break-all;cursor:pointer;color:#36F">能源（850101）</span></span>上涨提振，担忧巴西糖醇比降低，郑糖重心上移。但国内糖企亦有套保和交割需求，一定程度上限制了糖价上涨空间。原油大幅回落时也会对糖价形成影响。</p></div></div>
