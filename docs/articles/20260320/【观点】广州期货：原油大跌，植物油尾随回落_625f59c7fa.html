      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>3月19日（周四），南部半岛棕油压榨商协会（ SPPOMA ）发布的数据显示，2026年3月1-15日马来西亚棕榈油产量环比下滑5.28%，鲜果串单产下降2.96%，出油率下降0.44%。受近期价格高涨影响，食用需求减弱，库存略增，遏制了涨幅，但后续走势依然主要受原油价格影响。</p></div></div>
