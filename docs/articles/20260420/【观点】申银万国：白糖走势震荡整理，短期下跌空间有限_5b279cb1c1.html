        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>白糖：郑糖主力区间震荡。国际油价较高叠加主产国巴西新榨季开始，预计巴西制糖比将继续下调。不过国际糖价受近期油价大跌影响有所下调，预计下跌空间有限。国内方面，本榨季超预期增产拖累糖价，考虑到当前糖价已跌至近期低位，预计震荡运行。</p></div></div>
