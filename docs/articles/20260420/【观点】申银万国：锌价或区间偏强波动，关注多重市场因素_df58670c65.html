        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>锌：周末夜盘锌价收涨0.56%。锌精矿加工费持续低位，精矿供应阶段性紧张，冶炼产量延续增长。中钢协统计的镀锌板库存虽下降但总体高位。基建投资累计增速回升，汽车产销负增长；家电排产负增长；地产持续疲弱。锌价可能区间偏强波动。建议关注美伊战争、美元、冶炼产量和下游旺季需求等变化。</p></div></div>
