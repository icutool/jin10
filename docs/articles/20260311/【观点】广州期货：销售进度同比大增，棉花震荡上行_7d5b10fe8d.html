      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>据中国棉花网数据，截至3月5日，全国棉花销售率71.9%，同比增19.2个百分点，较过去四年均值增23.5个百分点。因金三银四旺季到来，开机率大幅回升，种植面积亦有较大幅度缩减，基本面偏多，农业农村部上调棉花价格预测值。多单持有。</p></div></div>
