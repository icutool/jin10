      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>4月6日（周一），泰国商务部周一表示，由于中东冲突推高全球燃料价格，导致生物柴油需求上升，泰国将自4月7日起收紧毛棕榈油出口并管控瓶装棕榈油价格。为保障供应量安全，缓解物流压力，各国或将陆续出台掺混比例提升政策。除却政策指引，当前油脂走势依然主要受原油价格影响。</p></div></div>
