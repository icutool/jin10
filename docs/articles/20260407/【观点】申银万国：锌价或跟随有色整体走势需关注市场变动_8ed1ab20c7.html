        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>锌：假期前国内锌价窄幅波动。锌精矿加工费回落，精矿供应阶段性紧张，冶炼产量延续增长。中钢协统计的镀锌板库存总体高位。基建投资累计增速趋缓，汽车产销正增长；家电排产负增长；地产持续疲弱。锌价可能跟随有色整体走势。建议关注美伊战争、美元、冶炼产量和下游旺季需求等变化。</p></div></div>
