      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>地缘政治风险带来的成本溢价出现回吐，导致期货盘面大幅下挫。然而，供应端因利润亏损和原料偏紧而持续收缩，为价格提供了底部支撑，同时防水卷材开工率持续维持高位、道路沥青开工雨季后逐步进入旺季。未来行情将主要取决于地缘局势的演变以及4月旺季需求启动的实际强度。</p></div></div>
