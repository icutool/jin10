        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>炼厂利润偏低抑制开工，主营炼厂优先保供汽柴油，地方炼厂原料供应受伊朗局势影响存潜在风险。随着气温回升，终端项目陆续复工，受高价抑制及部分南方地区降雨天气影响，下游项目开工积极性不高。地缘局势动荡依然是影响当前市场的最大因素，沥青短期跟随原油反弹表现为主。</p></div></div>
