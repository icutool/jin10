      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>由于潜在的国内供应问题，巴基斯坦国家<span><span class="link-wrapper link-blue" style="word-break:break-all;cursor:pointer;color:#36F">食品安全（885406）</span></span>和研究部决定今年不开放糖出口。国内，受美伊反复冲突<span><span class="link-wrapper link-blue" style="word-break:break-all;cursor:pointer;color:#36F">能源（850101）</span></span>上涨提振，担忧巴西糖醇比降低，郑糖偏强震荡。但国内糖企亦有套保和交割需求，一定程度上限制了糖价上涨空间。</p></div></div>
