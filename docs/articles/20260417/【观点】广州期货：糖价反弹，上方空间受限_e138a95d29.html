        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>Datagro 周四公布的一份报告显示，巴西2026/27年度的乙醇总产量预计将达416亿升，较上一年度增长14.6%，原因在于甘蔗乙醇和<span><span class="link-wrapper link-blue" style="word-break:break-all;cursor:pointer;color:#36F">玉米（885811）</span></span>乙醇产量联袂增加。国内，糖价受现货价格和糖醇比改善支撑，低位反弹，但年内供过于求格局限制了反弹空间。</p></div></div>
