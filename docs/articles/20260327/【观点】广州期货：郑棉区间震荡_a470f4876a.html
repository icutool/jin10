      <article class="article-wrap">
        <div class="news-content article-content" id="" style="position:relative"><div class="news-content-parsed"><p>内外棉价差仍保持在较高水平，外棉到港节奏偏快， 港口库存继续增加。据 Mysteel 调研显示，截止至3月26日，进口棉主要港口库存周环比增加0.09%，总库存58.20万吨。进口量的同比大增和滑准税的发放施压于棉价，但下游纺织订单表现不错，给予较好支撑。预计棉价区间1.5—1.55万元区间内震荡。</p></div></div>
